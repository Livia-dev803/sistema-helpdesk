<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Helpdesk | Controle de Chamados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>⚙️ Dashboard Helpdesk</h1>
            <p>Sistema interno de controle e resolução de chamados técnicos.</p>
        </header>

        <main class="grid-layout">
            <!-- Formulário de Criação -->
            <section class="form-section">
                <h2>Novo Chamado</h2>
                <div class="form-group">
                    <label>Título do Problema</label>
                    <input type="text" id="titulo" placeholder="Ex: Erro ao conectar no Banco de Dados">
                </div>
                <div class="form-group">
                    <label>Descrição Detalhada</label>
                    <textarea id="descricao" rows="4" placeholder="Descreva o erro ou a solicitação..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Prioridade</label>
                        <select id="prioridade">
                            <option value="Baixa">Baixa</option>
                            <option value="Média">Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="categoria">
                            <option value="Software">Software</option>
                            <option value="Hardware">Hardware</option>
                            <option value="Redes">Redes</option>
                            <option value="Acessos">Acessos</option>
                        </select>
                    </div>
                </div>
                <button onclick="adicionarChamado()">Abrir Chamado</button>
            </section>

            <!-- Painel de Visualização -->
            <section class="view-section">
                <div class="view-header">
                    <h2>Chamados Ativos</h2>
                    <div class="filtro-group">
                        <label>Filtrar por Status:</label>
                        <select id="filtro-status" onchange="renderizarChamados()">
                            <option value="Todos">Todos</option>
                            <option value="Aberto">Abertos</option>
                            <option value="Em Atendimento">Em Atendimento</option>
                            <option value="Concluído">Concluídos</option>
                        </select>
                    </div>
                </div>
                <div id="lista-chamados" class="lista-container">
                    <!-- Os cards de chamados vão aparecer aqui dinamicamente -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
